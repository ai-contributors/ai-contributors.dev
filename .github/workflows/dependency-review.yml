name: Dependency Review

# No paths filter: "Dependency Review" is a required status check in the
# main-protection ruleset, and required checks are unaware of path filters —
# a PR that skips this workflow would wait forever on "Expected". On PRs
# without dependency changes the action completes quickly with nothing to
# review and reports success.
on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
