name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate spec source
        run: pnpm validate:spec

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm coverage:check

      - name: Check
        run: pnpm check

      - name: Build production
        if: github.event_name != 'pull_request'
        run: pnpm build
        env:
          ASTRO_SITE: https://ai-contributors.dev
          ASTRO_BASE: /ai-contributor-spec/

      - name: Build PR preview
        if: github.event_name == 'pull_request'
        run: pnpm build
        env:
          ASTRO_SITE: https://ai-contributors.dev
          ASTRO_BASE: /pr-preview/pr-${{ github.event.pull_request.number }}/

      - name: Upload built site
        uses: actions/upload-artifact@v7
        with:
          name: site-dist
          path: dist
          if-no-files-found: error

      - name: Lighthouse accessibility and performance budgets
        run: pnpm lhci:assert

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: error

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download built site
        uses: actions/download-artifact@v7
        with:
          name: site-dist
          path: dist

      - name: Prepare gh-pages branch
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages "https://github.com/${GITHUB_REPOSITORY}.git" gh-pages
          else
            mkdir gh-pages
            git -C gh-pages init
            git -C gh-pages checkout -b gh-pages
          fi

      - name: Update production site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          find gh-pages -mindepth 1 -maxdepth 1 ! -name ".git" ! -name "pr-preview" ! -name "ai-contributor-spec" -exec rm -rf {} +
          rm -rf gh-pages/ai-contributor-spec
          mkdir -p gh-pages/ai-contributor-spec
          cp -R dist/. gh-pages/ai-contributor-spec/
          rm -f gh-pages/ai-contributor-spec/CNAME
          node --input-type=module -e 'import { writeFile } from "node:fs/promises"; import { productionRedirectHtml } from "./scripts/pages-routing.mjs"; await writeFile("gh-pages/index.html", productionRedirectHtml(), "utf8"); await writeFile("gh-pages/CNAME", "ai-contributors.dev\n", "utf8");'
          touch gh-pages/.nojekyll
          git -C gh-pages config user.name "github-actions[bot]"
          git -C gh-pages config user.email "github-actions[bot]@users.noreply.github.com"
          git -C gh-pages add -A
          git -C gh-pages commit -m "Deploy production" || echo "No changes"
          git -C gh-pages push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name: github-pages
      url: https://ai-contributors.dev/pr-preview/pr-${{ github.event.pull_request.number }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download built site
        uses: actions/download-artifact@v7
        with:
          name: site-dist
          path: dist

      - name: Prepare gh-pages branch
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages "https://github.com/${GITHUB_REPOSITORY}.git" gh-pages
          else
            mkdir gh-pages
            git -C gh-pages init
            git -C gh-pages checkout -b gh-pages
          fi

      - name: Update PR preview
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PREVIEW_DIR="gh-pages/pr-preview/pr-${PR_NUMBER}"
          rm -rf "${PREVIEW_DIR}"
          mkdir -p "${PREVIEW_DIR}"
          cp -R dist/. "${PREVIEW_DIR}/"
          rm -f "${PREVIEW_DIR}/CNAME"
          touch gh-pages/.nojekyll
          git -C gh-pages config user.name "github-actions[bot]"
          git -C gh-pages config user.email "github-actions[bot]@users.noreply.github.com"
          git -C gh-pages add -A
          git -C gh-pages commit -m "Deploy PR #${PR_NUMBER} preview" || echo "No changes"
          git -C gh-pages push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: gh-pages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://ai-contributors.dev/pr-preview/pr-${prNumber}/`;
            const marker = '<!-- ai-contributors-preview-url -->';
            const body = `${marker}\n## Preview Deployment\n\n${previewUrl}\n\nThis preview is rebuilt from the latest pull request commit and removed when the pull request closes.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare gh-pages branch
        id: pages
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages "https://github.com/${GITHUB_REPOSITORY}.git" gh-pages
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove PR preview
        if: steps.pages.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PREVIEW_DIR="pr-preview/pr-${PR_NUMBER}"
          cd gh-pages
          if [ -d "${PREVIEW_DIR}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "${PREVIEW_DIR}"
            git commit -m "Cleanup PR #${PR_NUMBER} preview"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
          fi

      - name: Upload artifact
        if: steps.pages.outputs.exists == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: gh-pages

      - name: Deploy to GitHub Pages
        if: steps.pages.outputs.exists == 'true'
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
