t part of this spec.</h1><p class="nf-lede astro-ibpinaeu">The page may have moved between releases, or the link could be stale. Search the docs or head back to the entry points below.</p><div class="nf-search astro-ibpinaeu"><input id="nf-search-input" type="search" placeholder="Search the docs…" autocomplete="off" aria-label="Search the docs" class="astro-ibpinaeu"><div id="nf-search-results" class="nf-search-results astro-ibpinaeu" aria-live="polite"></div></div><div class="nf-cta-row astro-ibpinaeu"><a class="nf-btn nf-btn-primary astro-ibpinaeu" href="/pr-preview/pr-36/">Back to the homepage</a><a class="nf-btn nf-btn-ghost astro-ibpinaeu" href="/pr-preview/pr-36/docs/">Read the docs</a><a class="nf-btn nf-btn-ghost astro-ibpinaeu" href="/pr-preview/pr-36/specification">Open the specification</a></div></main></div></body></html><script>(function(){const PAGEFIND_URL = "/pr-preview/pr-36/pagefind/pagefind.js";

  const input = document.getElementById('nf-search-input');
  const results = document.getElementById('nf-search-results');
  if (input && results) {
    let pagefind = null;
    let loading = null;
    let token = 0;

    async function load() {
      if (pagefind) return pagefind;
      if (loading) return loading;
      loading = (async () => {
        try {
          const mod = await import(/* @vite-ignore */ PAGEFIND_URL);
          if (mod.options) await mod.options({ excerptLength: 24 });
          return (pagefind = mod);
        } catch (err) {
          console.error('[404] pagefind unavailable', err);
          return null;
        }
      })();
      return loading;
    }

    function empty(message) {
      results.innerHTML = '';
      const div = document.createElement('div');
      div.className = 'nf-search-empty';
      div.textContent = message;
      results.appendChild(div);
    }

    async function render(query) {
      const id = ++token;
      const q = (query || '').trim();
      if (!q) {
        results.innerHTML = '';
        return;
      }
      const pf = await load();
      if (id !== token) return;
      if (!pf) {
        empty('Search index isn’t available here.');
        return;
      }
      const search = await pf.search(q);
      if (id !== token) return;
      if (!search || !search.results.length) {
        empty(`No matches for “${q}”.`);
        return;
      }
      const top = search.results.slice(0, 8);
      const data = await Promise.all(top.map((r) => r.data()));
      if (id !== token) return;
      results.innerHTML = '';
      for (const d of data) {
        const a = document.createElement('a');
        a.className = 'nf-search-hit';
        a.href = d.url;
        const title = document.createElement('div');
        title.className = 'nf-search-hit-title';
        title.textContent = (d.meta && d.meta.title) || d.url;
        a.appendChild(title);
        if (d.excerpt) {
          const ex = document.createElement('div');
          ex.className = 'nf-search-hit-excerpt';
          ex.innerHTML = d.excerpt;
          a.appendChild(ex);
        }
        results.appendChild(a);
      }
    }

    let debounce;
    input.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => render(input.value), 80);
    });
    load();
  }
})();</script>
